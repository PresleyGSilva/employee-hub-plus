name: Build Desktop App (Windows)

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/build-desktop.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build Windows installer (x64 + ia32)
        working-directory: desktop
        run: npm run build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TottusCred-Windows-Setup
          path: desktop/dist/*.exe

      - name: Publish GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Tottus Cred Desktop (última versão)
          body: |
            Instalador automático do Tottus Cred para Windows.
            Compatível com Windows 8, 10 e 11 (32 e 64 bits).
            O app abre o sistema online, então atualizações do site aparecem sozinhas — não precisa reinstalar.
          files: desktop/dist/*.exe
          make_latest: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
